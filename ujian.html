<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ST Bhinneka Tech Fest 2026</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#4f46e5,#7c3aed,#06b6d4);
    min-height:100vh;
}

.card{
    border-radius: (165, 104, 194);
    border-radius:20px;
}

.card-header{
    background:linear-gradient(90deg,#4f46e5,#7c3aed);
    color :rgb(248, 252, 252);
    border-radius:20px 20px 0 0 !important;
}

.form-control,
.form-select{
    border-radius:12px;
}

.form-control:focus,
.form-select:focus{
    box-shadow:0 0 8px rgba(79,70,229,.4);
    border-color:#4f46e5;
}

.btn-submit{
    background:linear-gradient(90deg,#4f46e5,#7c3aed);
    color:rgb(245, 239, 245);
    border:none;
    border-radius:12px;
    font-size:18px;
    transition:.3s;
}

.btn-submit:hover{
    transform:scale(1.03);
    background:linear-gradient(90deg,#4338ca,#6d28d9);
}

</style>

</head>

<body>

<div class="container py-5">

<div class="card shadow-lg">

<div class="card-header text-center py-4">

<h2><i class="bi bi-cpu-fill"></i> ST Bhinneka Tech Fest 2026</h2>

<p class="mb-0">
Daftarkan dirimu dan jadilah bagian dari inovasi teknologi!
</p>

</div>

<div class="card-body p-4">

<form onsubmit="return sukses()">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">
<i class="bi bi-person-fill"></i>
Nama Lengkap
</label>

<input
type="text"
class="form-control"
required>
</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-whatsapp"></i>
No. WhatsApp
</label>

<input
type="tel"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-envelope-fill"></i>
Email
</label>

<input
type="email"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-building"></i>
Asal Kampus / Sekolah
</label>

<input
type="text"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-calendar-event-fill"></i>
Pilihan Event
</label>

<select class="form-select" required>

<option value="">Pilih Event</option>

<option>UI/UX Design Battle</option>

<option>Web Design Challenge</option>

<option>Digital Business Pitching</option>

<option>AI Content Competition</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-people-fill"></i>
Kategori Peserta
</label>

<select class="form-select" required>

<option value="">Kategori</option>

<option>Mahasiswa</option>

<option>Pelajar</option>

<option>Umum</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-calendar-date-fill"></i>
Tanggal Kehadiran
</label>

<input
type="date"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-card-image"></i>
Upload Kartu Pelajar/Mahasiswa
</label>

<input
type="file"
class="form-control"
required>

</div>

<div class="col-12 mb-3">

<label class="form-label">
<i class="bi bi-chat-left-text-fill"></i>
Alasan Mengikuti Event
</label>

<textarea
rows="4"
class="form-control"
required></textarea>

</div>

<div class="d-grid mt-4">

<button class="btn btn-submit btn-lg">

<i class="bi bi-send-fill"></i>

Submit Pendaftaran

</button>

</div>

</div>

</form>

</div>

</div>

</div>

<script>

function sukses(){

document.body.innerHTML=`

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg p-5 text-center" style="max-width:600px;border-radius:20px;">

<h1 class="text-success">

<i class="bi bi-check-circle-fill"></i>

</h1>

<h2 class="mt-3">

Terima Kasih!

</h2>

<p class="fs-4">

Pendaftaran <b>Campus Tech Fest 2026</b> berhasil dikirim.

</p>

<a href="" class="btn btn-primary mt-3">

Daftar Lagi

</a>

</div>

</div>

`;

return false;

}

</script>

</body>
</html>
